<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rejseliste</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f4fb;
      color: #222;
    }

    header {
      background: white;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 20px;
      padding: 20px;
    }

    .panel {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h2, h3 {
      margin-top: 0;
    }

    .category {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 14px;
      background: #f2f0fb;
      cursor: pointer;
    }

    .category.active {
      background: #ddd8ff;
      font-weight: bold;
    }

    .category-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      font-size: 22px;
    }

    .progress {
      font-size: 13px;
      color: #666;
    }

    .top-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #5b4acb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid #eee;
      font-size: 17px;
    }

    .item input {
      width: 22px;
      height: 22px;
    }

    .item.done span {
      text-decoration: line-through;
      color: #999;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin: 10px 0;
      font-size: 15px;
    }

    label input {
      margin-right: 8px;
    }

    .save-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #5b4acb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-top: 14px;
      cursor: pointer;
    }

    .small-button {
      padding: 8px 10px;
      border: none;
      border-radius: 10px;
      background: #eee;
      cursor: pointer;
      margin-top: 8px;
    }

    .danger {
      background: #ffdddd;
      color: #a40000;
    }

    .mobile-nav {
      display: none;
    }

    @media (max-width: 800px) {
      body {
        background: #f5f4fb;
      }

      .app {
        display: block;
        padding: 14px;
      }

      .desktop-only {
        display: none;
      }

      .panel {
        margin-bottom: 16px;
        box-shadow: none;
      }

      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: white;
        border-top: 1px solid #ddd;
        justify-content: space-around;
        padding: 10px 0;
      }

      .mobile-nav button {
        background: none;
        border: none;
        font-size: 13px;
        color: #333;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      body {
        padding-bottom: 70px;
      }
    }
  </style>
</head>

<body>
  <header>Rejseliste</header>

  <main class="app">
    <section id="listScreen" class="panel screen active">
      <button class="top-button" onclick="startNewTrip()">↻ Start ny rejse</button>

      <h2>Kategorier</h2>
      <div id="categoryList"></div>

      <h3>Tilføj kategori</h3>
      <input id="newCategoryInput" type="text" placeholder="Fx Medicin" />
      <button class="save-button" onclick="addCategory()">Tilføj kategori</button>
    </section>

    <section id="detailScreen" class="panel screen active">
      <h2 id="selectedCategoryTitle">Vælg en kategori</h2>
      <p id="selectedProgress"></p>
      <div id="itemsList"></div>

      <button class="small-button danger" onclick="deleteSelectedCategory()">Slet kategori</button>
    </section>

    <section id="addScreen" class="panel screen active">
      <h2>Tilføj ny ting</h2>

      <label>Navn på ting</label>
      <input id="newItemInput" type="text" placeholder="Fx Pas" />

      <h3>Vælg kategorier</h3>
      <div id="categoryCheckboxes"></div>

      <button class="save-button" onclick="addItem()">Gem</button>
    </section>
  </main>

  <nav class="mobile-nav">
    <button onclick="showScreen('listScreen')">📋<br>Liste</button>
    <button onclick="showScreen('addScreen')">➕<br>Tilføj</button>
    <button onclick="startNewTrip()">↻<br>Ny rejse</button>
  </nav>

  <script>
    let data = JSON.parse(localStorage.getItem("rejseliste")) || {
      selectedCategory: "Mig",
      categories: [
        {
          name: "Mig",
          icon: "👤",
          items: [
            { name: "Pas", done: false },
            { name: "Undertøj", done: false },
            { name: "Badetøj", done: false },
            { name: "Oplader", done: false }
          ]
        },
        {
          name: "Min mand",
          icon: "👤",
          items: [
            { name: "Pas", done: false },
            { name: "Underbukser", done: false },
            { name: "Strømper", done: false }
          ]
        },
        {
          name: "Vores dreng",
          icon: "👦",
          items: [
            { name: "Pas", done: false },
            { name: "Bleer", done: false },
            { name: "Sutter", done: false },
            { name: "Nattøj", done: false }
          ]
        },
        {
          name: "Vores pige",
          icon: "👧",
          items: [
            { name: "Pas", done: false },
            { name: "Tøj", done: false },
            { name: "Sutter", done: false }
          ]
        },
        {
          name: "Svømmeredskaber",
          icon: "🏊",
          items: [
            { name: "Håndklæde", done: false },
            { name: "Badetøj", done: false },
            { name: "Badevinger", done: false }
          ]
        },
        {
          name: "Udstyr",
          icon: "🧳",
          items: [
            { name: "Opladere", done: false },
            { name: "Klapvogn", done: false }
          ]
        },
        {
          name: "Pusle",
          icon: "🧸",
          items: [
            { name: "Bleer", done: false },
            { name: "Vådservietter", done: false }
          ]
        },
        {
          name: "Spisning",
          icon: "🍴",
          items: [
            { name: "Hagesmæk", done: false },
            { name: "Snacks", done: false }
          ]
        },
        {
          name: "Dokumenter",
          icon: "📄",
          items: [
            { name: "Pas", done: false },
            { name: "Billetter", done: false },
            { name: "Forsikring", done: false }
          ]
        },
        {
          name: "Medicin",
          icon: "💊",
          items: [
            { name: "Panodil", done: false },
            { name: "Termometer", done: false }
          ]
        }
      ]
    };

    function save() {
      localStorage.setItem("rejseliste", JSON.stringify(data));
    }

    function getSelectedCategory() {
      return data.categories.find(c => c.name === data.selectedCategory);
    }

    function countDone(category) {
      return category.items.filter(item => item.done).length;
    }

    function render() {
      renderCategories();
      renderItems();
      renderCategoryCheckboxes();
      save();
    }

    function renderCategories() {
      const container = document.getElementById("categoryList");
      container.innerHTML = "";

      data.categories.forEach(category => {
        const done = countDone(category);
        const total = category.items.length;

        const div = document.createElement("div");
        div.className = "category";

        if (category.name === data.selectedCategory) {
          div.classList.add("active");
        }

        div.onclick = function () {
          data.selectedCategory = category.name;
          render();
          showScreen("detailScreen");
        };

        div.innerHTML = `
          <div class="category-left">
            <span class="icon">${category.icon}</span>
            <span>${category.name}</span>
          </div>
          <span class="progress">${done} / ${total}</span>
        `;

        container.appendChild(div);
      });
    }

    function renderItems() {
      const category = getSelectedCategory();

      if (!category) return;

      document.getElementById("selectedCategoryTitle").innerText =
        category.icon + " " + category.name;

      document.getElementById("selectedProgress").innerText =
        countDone(category) + " / " + category.items.length + " færdige";

      const container = document.getElementById("itemsList");
      container.innerHTML = "";

      category.items.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";

        if (item.done) {
          div.classList.add("done");
        }

        div.innerHTML = `
          <input type="checkbox" ${item.done ? "checked" : ""} onchange="toggleItem(${index})">
          <span>${item.name}</span>
        `;

        container.appendChild(div);
      });
    }

    function renderCategoryCheckboxes() {
      const container = document.getElementById("categoryCheckboxes");
      container.innerHTML = "";

      data.categories.forEach(category => {
        const label = document.createElement("label");

        label.innerHTML = `
          <input type="checkbox" value="${category.name}">
          ${category.icon} ${category.name}
        `;

        container.appendChild(label);
      });
    }

    function toggleItem(index) {
      const category = getSelectedCategory();
      category.items[index].done = !category.items[index].done;
      render();
    }

    function addItem() {
      const input = document.getElementById("newItemInput");
      const itemName = input.value.trim();

      if (!itemName) {
        alert("Skriv navnet på tingen først.");
        return;
      }

      const selected = document.querySelectorAll("#categoryCheckboxes input:checked");

      if (selected.length === 0) {
        alert("Vælg mindst én kategori.");
        return;
      }

      selected.forEach(checkbox => {
        const category = data.categories.find(c => c.name === checkbox.value);

        const alreadyExists = category.items.some(
          item => item.name.toLowerCase() === itemName.toLowerCase()
        );

        if (!alreadyExists) {
          category.items.push({
            name: itemName,
            done: false
          });
        }
      });

      input.value = "";

      document.querySelectorAll("#categoryCheckboxes input").forEach(checkbox => {
        checkbox.checked = false;
      });

      render();
      alert("Tingen er tilføjet.");
    }

    function addCategory() {
      const input = document.getElementById("newCategoryInput");
      const name = input.value.trim();

      if (!name) {
        alert("Skriv et kategorinavn.");
        return;
      }

      const alreadyExists = data.categories.some(
        category => category.name.toLowerCase() === name.toLowerCase()
      );

      if (alreadyExists) {
        alert("Kategorien findes allerede.");
        return;
      }

      data.categories.push({
        name: name,
        icon: "📦",
        items: []
      });

      input.value = "";
      render();
    }

    function deleteSelectedCategory() {
      const category = getSelectedCategory();

      if (!category) return;

      if (!confirm("Vil du slette kategorien " + category.name + "?")) {
        return;
      }

      data.categories = data.categories.filter(c => c.name !== category.name);

      if (data.categories.length > 0) {
        data.selectedCategory = data.categories[0].name;
      } else {
        data.selectedCategory = "";
      }

      render();
      showScreen("listScreen");
    }

    function startNewTrip() {
      if (!confirm("Vil du nulstille alle krydser? Selve listen bliver gemt.")) {
        return;
      }

      data.categories.forEach(category => {
        category.items.forEach(item => {
          item.done = false;
        });
      });

      render();
    }

    function showScreen(id) {
      if (window.innerWidth > 800) return;

      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
    }

    render();
  </script>
</body>
</html>
