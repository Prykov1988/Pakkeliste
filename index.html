<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rejseliste</title>

<meta name="theme-color" content="#5b4acb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rejseliste">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f5f4fb;
color:#222;
}

header{
background:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:10;
}

.app{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:280px 1fr 320px;
gap:20px;
padding:20px;
}

.panel{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.list-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:14px;
}

.family-select{
padding:10px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
background:white;
max-width:170px;
}

h2,h3{margin-top:0;}

.category{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
margin-bottom:10px;
border-radius:14px;
background:#f2f0fb;
cursor:pointer;
}

.category.active{
background:#ddd8ff;
font-weight:bold;
}

.category-left{
display:flex;
align-items:center;
gap:10px;
}

.icon{font-size:22px;}

.progress{
font-size:13px;
color:#666;
}

.top-button,.save-button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#5b4acb;
color:white;
font-size:16px;
font-weight:bold;
margin-top:14px;
margin-bottom:14px;
cursor:pointer;
}

.section{
margin-top:22px;
padding-top:8px;
border-top:2px solid #eee;
}

.section-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:8px;
}

.section-title{
font-size:22px;
font-weight:bold;
flex:1;
}

.section-drop{
min-height:20px;
border-radius:14px;
padding-bottom:6px;
}

.section-drop.drag-over{
background:#eeeaff;
outline:2px dashed #5b4acb;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:13px 0;
border-bottom:1px solid #eee;
font-size:17px;
transition:0.15s ease;
}

.item span{flex:1;}

.item input{
width:22px;
height:22px;
accent-color:#5b4acb;
}

.item.done span{
text-decoration:line-through;
color:#999;
}

.item.dragging{
opacity:0.45;
background:#eeeaff;
border-radius:12px;
}

.item.drag-over{
background:#ddd8ff;
border-radius:12px;
transform:scale(1.02);
}

input[type="text"]{
width:100%;
padding:13px;
font-size:16px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:14px;
}

label{
display:block;
margin:10px 0;
font-size:15px;
}

label input{margin-right:8px;}

.mobile-nav{display:none;}

.edit-btn{
border:none;
background:#eee;
border-radius:10px;
padding:7px 9px;
cursor:pointer;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.edit-box{
background:#fff2c6;
border-radius:12px;
padding:10px;
margin-bottom:14px;
font-size:14px;
display:none;
}

.edit-box.active{display:block;}

#selectedCategoryTitle{
display:flex;
align-items:center;
gap:10px;
}

#selectedCategoryTitle span{
flex:1;
}

@media(max-width:800px){
.app{
display:block;
padding:14px;
}

.panel{
margin-bottom:16px;
box-shadow:none;
}

.mobile-nav{
display:flex;
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
justify-content:space-around;
padding:10px 0;
}

.mobile-nav button{
background:none;
border:none;
font-size:13px;
color:#333;
}

.screen{display:none;}
.screen.active{display:block;}

body{padding-bottom:70px;}
}
</style>
</head>

<body>

<header>Rejseliste</header>

<main class="app">

<section id="listScreen" class="panel screen active">

<div class="list-top">
<h2>Kategorier</h2>

<select id="familySelect" class="family-select" onchange="changeFamily()">
<option value="rykov">Familie Rykov</option>
<option value="nielsen">Familie Nielsen</option>
</select>
</div>

<button class="top-button" onclick="startNewTrip()">↻ Start ny rejse</button>

<div id="categoryList"></div>

<h3>Tilføj kategori</h3>
<input id="newCategoryEmojiInput" type="text" placeholder="Emoji, fx 🧳 (valgfri)">
<input id="newCategoryInput" type="text" placeholder="Kategorinavn">
<button class="save-button" onclick="addCategory()">Tilføj kategori</button>
</section>

<section id="detailScreen" class="panel screen active">
<div id="editBox2" class="edit-box">
Redigering er slået til. Brug ✏️ for at redigere og 🗑️ for at slette.
</div>

<h2 id="selectedCategoryTitle">Vælg en kategori</h2>
<p id="selectedProgress"></p>

<button class="top-button" onclick="addSectionToCurrentCategory()">➕ Tilføj underkategori</button>

<div id="sectionsList"></div>
</section>

<section id="addScreen" class="panel screen active">
<h2>Tilføj ny ting</h2>

<label>Navn på ting</label>
<input id="newItemInput" type="text" placeholder="Fx Pas">

<h3>Vælg kategorier</h3>
<div id="categoryCheckboxes"></div>

<button class="save-button" onclick="addItem()">Gem</button>
</section>

</main>

<nav class="mobile-nav">
<button onclick="showScreen('listScreen')">📋<br>Liste</button>
<button onclick="showScreen('addScreen')">➕<br>Tilføj</button>
<button id="editNavButton" onclick="toggleEditMode()">✏️<br>Rediger</button>
<button onclick="startNewTrip()">↻<br>Ny rejse</button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, set, off } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDlKEP7_KezbNVEviM77GrvlH8u68vNwTQ",
authDomain:"pakkeliste-a8089.firebaseapp.com",
databaseURL:"https://pakkeliste-a8089-default-rtdb.europe-west1.firebasedatabase.app/",
projectId:"pakkeliste-a8089",
storageBucket:"pakkeliste-a8089.firebasestorage.app",
messagingSenderId:"359809963583",
appId:"1:359809963583:web:7a98e4e94bd2fd3fdb8a8a"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let currentFamily=localStorage.getItem("currentFamily") || "rykov";
let dataRef=null;

let data={categories:[]};
let selectedCategory="";
let editMode=false;
let currentScreen="listScreen";

const defaultFamilyData={
rykov:{
categories:[
{
name:"Pernille",
icon:"👩",
sections:[
{name:"Tøj",items:[
{name:"Underbukser",done:false},
{name:"BH’er",done:false},
{name:"Sokker",done:false}
]},
{name:"Dokumenter",items:[
{name:"Pas",done:false}
]}
]
},
{
name:"Michael",
icon:"👨",
sections:[
{name:"Tøj",items:[
{name:"Underbukser",done:false},
{name:"Strømper",done:false}
]},
{name:"Dokumenter",items:[
{name:"Pas",done:false}
]}
]
},
{
name:"Oliver",
icon:"👦",
sections:[
{name:"Tøj",items:[
{name:"Underbukser",done:false},
{name:"Undertrøjer",done:false},
{name:"Sokker",done:false},
{name:"Bukser",done:false},
{name:"Trøje",done:false},
{name:"T-shirt",done:false}
]},
{name:"Overtøj",items:[
{name:"Hue - kold",done:false},
{name:"Jakke",done:false}
]},
{name:"Toiletsager",items:[
{name:"Tandbørste",done:false}
]}
]
},
{
name:"Emma",
icon:"👧",
sections:[
{name:"Tøj",items:[
{name:"Tøj",done:false},
{name:"Nattøj",done:false}
]},
{name:"Dokumenter",items:[
{name:"Pas",done:false}
]}
]
}
]
},
nielsen:{
categories:[
{name:"Mor",icon:"👩",sections:[{name:"Diverse",items:[]}]},
{name:"Far",icon:"👨",sections:[{name:"Diverse",items:[]}]},
{name:"Barn",icon:"👧",sections:[{name:"Diverse",items:[]}]}
]
}
};

function getFamilyPath(){
return "families/"+currentFamily;
}

function startListening(){
if(dataRef){
off(dataRef);
}

dataRef=ref(db,getFamilyPath());

onValue(dataRef,(snapshot)=>{
if(snapshot.exists()){
data=normalizeData(snapshot.val());
}else{
data=structuredClone(defaultFamilyData[currentFamily] || {categories:[]});
set(dataRef,data);
}

if(!selectedCategory && data.categories.length){
selectedCategory=data.categories[0].name;
}

if(!getSelectedCategory() && data.categories.length){
selectedCategory=data.categories[0].name;
}

render();
});
}

function normalizeData(raw){
if(!raw || !raw.categories)return {categories:[]};

return {
categories:Object.values(raw.categories).map(category=>{
let sections=[];

if(category.sections){
sections=Object.values(category.sections).map(section=>({
name:section.name || "Diverse",
items:Object.values(section.items || {}).map(item=>({
name:item.name || "Uden navn",
done:!!item.done
}))
}));
}else if(category.items){
sections=[{
name:"Diverse",
items:Object.values(category.items || {}).map(item=>({
name:item.name || "Uden navn",
done:!!item.done
}))
}];
}else{
sections=[{name:"Diverse",items:[]}];
}

return {
name:category.name || "Uden navn",
icon:category.icon || "",
sections:sections
};
})
};
}

function save(){
set(dataRef,data);
}

function getSelectedCategory(){
return data.categories.find(c=>c.name===selectedCategory);
}

function getSelectedCategoryIndex(){
return data.categories.findIndex(c=>c.name===selectedCategory);
}

function countDone(category){
let count=0;
category.sections.forEach(section=>{
section.items.forEach(item=>{
if(item.done)count++;
});
});
return count;
}

function itemCount(category){
let count=0;
category.sections.forEach(section=>{
count+=section.items.length;
});
return count;
}

function render(){
document.getElementById("familySelect").value=currentFamily;
renderCategories();
renderItems();
renderCategoryCheckboxes();
renderEditMode();
updateEditButtonVisibility(currentScreen);
}

function renderEditMode(){
document.getElementById("editBox2").classList.toggle("active",editMode);
}

function renderCategories(){
const container=document.getElementById("categoryList");
container.innerHTML="";

data.categories.forEach(category=>{
const done=countDone(category);
const total=itemCount(category);

const div=document.createElement("div");
div.className="category";

if(category.name===selectedCategory){
div.classList.add("active");
}

div.onclick=function(){
selectedCategory=category.name;
showScreen("detailScreen");
};

div.innerHTML=`
<div class="category-left">
<span class="icon">${category.icon||""}</span>
<span>${category.name}</span>
</div>
<span class="progress">${done} / ${total}</span>
`;

container.appendChild(div);
});
}

function renderItems(){
const category=getSelectedCategory();
const title=document.getElementById("selectedCategoryTitle");
const progress=document.getElementById("selectedProgress");
const container=document.getElementById("sectionsList");

container.innerHTML="";
title.innerHTML="";

if(!category){
title.innerText="Ingen kategori valgt";
progress.innerText="";
return;
}

const titleText=document.createElement("span");
titleText.textContent=(category.icon||"")+" "+category.name;
title.appendChild(titleText);

if(editMode){
const categoryIndex=getSelectedCategoryIndex();

const editButton=document.createElement("button");
editButton.className="edit-btn";
editButton.textContent="✏️";
editButton.onclick=function(){
editCategory(categoryIndex);
};
title.appendChild(editButton);

const deleteButton=document.createElement("button");
deleteButton.className="edit-btn";
deleteButton.textContent="🗑️";
deleteButton.onclick=function(){
deleteCategory(categoryIndex);
};
title.appendChild(deleteButton);
}

progress.innerText=countDone(category)+" / "+itemCount(category)+" færdige";

category.sections.forEach((section,sectionIndex)=>{
const sectionDiv=document.createElement("div");
sectionDiv.className="section";

const header=document.createElement("div");
header.className="section-header";

const sectionTitle=document.createElement("div");
sectionTitle.className="section-title";
sectionTitle.textContent=section.name;

header.appendChild(sectionTitle);

const addButton=document.createElement("button");
addButton.className="edit-btn";
addButton.textContent="➕";
addButton.onclick=function(){
addItemToSection(sectionIndex);
};
header.appendChild(addButton);

if(editMode){
const editSectionButton=document.createElement("button");
editSectionButton.className="edit-btn";
editSectionButton.textContent="✏️";
editSectionButton.onclick=function(){
editSection(sectionIndex);
};
header.appendChild(editSectionButton);

const deleteSectionButton=document.createElement("button");
deleteSectionButton.className="edit-btn";
deleteSectionButton.textContent="🗑️";
deleteSectionButton.onclick=function(){
deleteSection(sectionIndex);
};
header.appendChild(deleteSectionButton);
}

sectionDiv.appendChild(header);

const dropArea=document.createElement("div");
dropArea.className="section-drop";

dropArea.addEventListener("dragover",function(e){
e.preventDefault();
dropArea.classList.add("drag-over");
});

dropArea.addEventListener("dragleave",function(){
dropArea.classList.remove("drag-over");
});

dropArea.addEventListener("drop",function(e){
e.preventDefault();
dropArea.classList.remove("drag-over");

const dragData=JSON.parse(e.dataTransfer.getData("text/plain"));
moveItem(dragData.sectionIndex,dragData.itemIndex,sectionIndex,section.items.length);
});

section.items.forEach((item,itemIndex)=>{
const div=document.createElement("div");
div.className="item";

div.draggable=true;

div.addEventListener("dragstart",function(e){
div.classList.add("dragging");
e.dataTransfer.setData("text/plain",JSON.stringify({
sectionIndex:sectionIndex,
itemIndex:itemIndex
}));
});

div.addEventListener("dragend",function(){
div.classList.remove("dragging");
document.querySelectorAll(".item").forEach(itemElement=>{
itemElement.classList.remove("drag-over");
});
document.querySelectorAll(".section-drop").forEach(area=>{
area.classList.remove("drag-over");
});
});

div.addEventListener("dragover",function(e){
e.preventDefault();

document.querySelectorAll(".item").forEach(itemElement=>{
itemElement.classList.remove("drag-over");
});

div.classList.add("drag-over");
});

div.addEventListener("dragleave",function(){
div.classList.remove("drag-over");
});

div.addEventListener("drop",function(e){
e.preventDefault();
div.classList.remove("drag-over");

const dragData=JSON.parse(e.dataTransfer.getData("text/plain"));
moveItem(dragData.sectionIndex,dragData.itemIndex,sectionIndex,itemIndex);
});

if(item.done){
div.classList.add("done");
}

div.innerHTML=`
<input type="checkbox" ${item.done?"checked":""}>
<span>${item.name}</span>
`;

div.querySelector("input").onchange=function(){
toggleItem(sectionIndex,itemIndex);
};

if(editMode){
const editButton=document.createElement("button");
editButton.className="edit-btn";
editButton.textContent="✏️";
editButton.onclick=function(){
editItem(sectionIndex,itemIndex);
};
div.appendChild(editButton);

const deleteButton=document.createElement("button");
deleteButton.className="edit-btn";
deleteButton.textContent="🗑️";
deleteButton.onclick=function(){
deleteItem(sectionIndex,itemIndex);
};
div.appendChild(deleteButton);
}

dropArea.appendChild(div);
});

sectionDiv.appendChild(dropArea);
container.appendChild(sectionDiv);
});
}

function moveItem(fromSectionIndex,fromItemIndex,toSectionIndex,toItemIndex){
const category=getSelectedCategory();
if(!category)return;

const fromSection=category.sections[fromSectionIndex];
const toSection=category.sections[toSectionIndex];

if(!fromSection || !toSection)return;

const movedItem=fromSection.items.splice(fromItemIndex,1)[0];

if(!movedItem)return;

if(fromSectionIndex===toSectionIndex && fromItemIndex<toItemIndex){
toItemIndex--;
}

toSection.items.splice(toItemIndex,0,movedItem);

render();
save();
}

function renderCategoryCheckboxes(){
const container=document.getElementById("categoryCheckboxes");
container.innerHTML="";

data.categories.forEach(category=>{
const label=document.createElement("label");

label.innerHTML=`
<input type="checkbox" value="${category.name}">
${category.icon||""} ${category.name}
`;

container.appendChild(label);
});
}

function updateEditButtonVisibility(activeScreenId){
const editButton=document.getElementById("editNavButton");
if(!editButton)return;

if(activeScreenId==="detailScreen"){
editButton.style.display="block";
}else{
editButton.style.display="none";
editMode=false;
}
}

window.changeFamily=function(){
const select=document.getElementById("familySelect");

currentFamily=select.value;
localStorage.setItem("currentFamily",currentFamily);

data={categories:[]};
selectedCategory="";
editMode=false;
currentScreen="listScreen";

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});

document.getElementById("listScreen").classList.add("active");

startListening();
};

window.toggleItem=function(sectionIndex,itemIndex){
const category=getSelectedCategory();
if(!category)return;

category.sections[sectionIndex].items[itemIndex].done=
!category.sections[sectionIndex].items[itemIndex].done;

render();
save();
};

window.addItem=function(){
const input=document.getElementById("newItemInput");
const name=input.value.trim();

if(!name){
alert("Skriv navnet på tingen først.");
return;
}

const selected=document.querySelectorAll("#categoryCheckboxes input:checked");

if(selected.length===0){
alert("Vælg mindst én kategori.");
return;
}

selected.forEach(box=>{
const cat=data.categories.find(c=>c.name===box.value);
if(!cat)return;

if(!cat.sections || cat.sections.length===0){
cat.sections=[{name:"Diverse",items:[]}];
}

const section=cat.sections[0];

const exists=section.items.some(
i=>i.name.toLowerCase()===name.toLowerCase()
);

if(!exists){
section.items.push({name:name,done:false});
}
});

input.value="";

render();
save();
};

function addItemToSection(sectionIndex){
const category=getSelectedCategory();
if(!category)return;

const section=category.sections[sectionIndex];
if(!section)return;

const name=prompt("Tilføj ting til "+section.name+":");

if(name===null)return;

const trimmedName=name.trim();

if(!trimmedName)return;

const exists=section.items.some(
item=>item.name.toLowerCase()===trimmedName.toLowerCase()
);

if(exists){
alert("Tingen findes allerede i denne underkategori.");
return;
}

section.items.push({
name:trimmedName,
done:false
});

render();
save();
}

window.addCategory=function(){
const emoji=document.getElementById("newCategoryEmojiInput").value.trim();
const name=document.getElementById("newCategoryInput").value.trim();

if(!name){
alert("Skriv et kategorinavn.");
return;
}

const exists=data.categories.some(
c=>c.name.toLowerCase()===name.toLowerCase()
);

if(exists){
alert("Kategorien findes allerede.");
return;
}

data.categories.push({
name:name,
icon:emoji,
sections:[
{name:"Diverse",items:[]}
]
});

selectedCategory=name;

document.getElementById("newCategoryEmojiInput").value="";
document.getElementById("newCategoryInput").value="";

render();
save();
};

window.addSectionToCurrentCategory=function(){
const category=getSelectedCategory();
if(!category)return;

const name=prompt("Navn på ny underkategori:");

if(name===null)return;

const trimmedName=name.trim();

if(!trimmedName)return;

const exists=category.sections.some(
section=>section.name.toLowerCase()===trimmedName.toLowerCase()
);

if(exists){
alert("Underkategorien findes allerede.");
return;
}

category.sections.push({
name:trimmedName,
items:[]
});

render();
save();
};

window.editCategory=function(index){
const category=data.categories[index];
if(!category)return;

const newEmoji=prompt("Ret emoji. Du kan også lade feltet være tomt:",category.icon||"");
if(newEmoji===null)return;

const newName=prompt("Ret kategorinavn:",category.name);
if(newName===null)return;

const trimmedName=newName.trim();

if(!trimmedName){
alert("Kategorien skal have et navn.");
return;
}

const exists=data.categories.some((c,i)=>
i!==index && c.name.toLowerCase()===trimmedName.toLowerCase()
);

if(exists){
alert("Der findes allerede en kategori med det navn.");
return;
}

const oldName=category.name;

category.icon=newEmoji.trim();
category.name=trimmedName;

if(selectedCategory===oldName){
selectedCategory=trimmedName;
}

render();
save();
};

window.editSection=function(sectionIndex){
const category=getSelectedCategory();
if(!category)return;

const section=category.sections[sectionIndex];

const newName=prompt("Ret underkategori:",section.name);

if(newName===null)return;

const trimmedName=newName.trim();

if(!trimmedName){
alert("Underkategorien skal have et navn.");
return;
}

const exists=category.sections.some((s,i)=>
i!==sectionIndex && s.name.toLowerCase()===trimmedName.toLowerCase()
);

if(exists){
alert("Der findes allerede en underkategori med det navn.");
return;
}

section.name=trimmedName;

render();
save();
};

window.editItem=function(sectionIndex,itemIndex){
const category=getSelectedCategory();
if(!category)return;

const item=category.sections[sectionIndex].items[itemIndex];

const newName=prompt("Ret ting:",item.name);
if(newName===null)return;

const trimmedName=newName.trim();

if(!trimmedName){
alert("Tingen skal have et navn.");
return;
}

item.name=trimmedName;

render();
save();
};

window.deleteItem=function(sectionIndex,itemIndex){
if(!confirm("Vil du slette denne ting?"))return;

const category=getSelectedCategory();
if(!category)return;

category.sections[sectionIndex].items.splice(itemIndex,1);

render();
save();
};

window.deleteSection=function(sectionIndex){
const category=getSelectedCategory();
if(!category)return;

const section=category.sections[sectionIndex];

if(section.items.length>0){
if(!confirm("Underkategorien indeholder ting. Vil du slette den alligevel?"))return;
}else{
if(!confirm("Vil du slette underkategorien "+section.name+"?"))return;
}

category.sections.splice(sectionIndex,1);

if(category.sections.length===0){
category.sections.push({name:"Diverse",items:[]});
}

render();
save();
};

window.deleteCategory=function(index){
const category=data.categories[index];
if(!category)return;

if(!confirm("Vil du slette kategorien "+category.name+"?"))return;

data.categories.splice(index,1);
selectedCategory=data.categories[0]?.name||"";
editMode=false;

render();
save();
showScreen("listScreen");
};

window.startNewTrip=function(){
if(!confirm("Vil du nulstille alle krydser?"))return;

data.categories.forEach(category=>{
category.sections.forEach(section=>{
section.items.forEach(item=>{
item.done=false;
});
});
});

editMode=false;
render();
save();
};

window.toggleEditMode=function(){
if(currentScreen!=="detailScreen")return;

editMode=!editMode;
render();
};

window.showScreen=function(id){
if(window.innerWidth>800)return;

currentScreen=id;

if(id!=="detailScreen"){
editMode=false;
}

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

updateEditButtonVisibility(id);
render();
};

document.getElementById("familySelect").value=currentFamily;
currentScreen="listScreen";
updateEditButtonVisibility("listScreen");
startListening();
</script>

</body>
</html>
